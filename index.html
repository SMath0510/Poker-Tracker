<!DOCTYPE html>
<html>
<head>
  <title>Poker Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<h1>🎲 Poker Tracker</h1>

<!-- REGISTER -->
<section>
  <h2>Register</h2>
  <input id="username" placeholder="Username">
  <button onclick="register()">Register</button>
</section>

<!-- ADD TRANSACTION -->
<section>
  <h2>Add Transaction</h2>
  <input id="userTx" placeholder="Username">
  <select id="type">
    <option value="BUY_IN">Buy-in</option>
    <option value="CASH_OUT">Cash-out</option>
  </select>
  <input id="amount" placeholder="Amount (INR)">
  <input id="date" type="date">
  <button onclick="addTransaction()">Add</button>
</section>

<!-- PROFIT -->
<section>
  <h2>Profit / Loss</h2>
  <input id="userProfit" placeholder="Username">
  <input id="profitDate" type="date">
  <button onclick="getProfit()">Get Profit</button>
  <p id="profitResult"></p>
</section>

<!-- TRANSACTIONS -->
<section>
  <h2>Transactions</h2>
  <input id="userTxView" placeholder="Username">
  <input id="txDate" type="date">
  <button onclick="getTransactions()">View</button>
  <ul id="txList"></ul>
</section>

<!-- RECK -->
<section>
  <h2>Reck (All Users)</h2>
  <input id="reckDate" type="date">
  <button onclick="reck()">Calculate</button>
  <p id="reckResult"></p>
</section>

<script src="app.js"></script>
</body>
</html>
