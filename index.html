<!DOCTYPE html>
<html>
<head>
  <title>Poker Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<h1>🎲 Poker Tracker</h1>

<!-- TOGGLE NAV -->
<div class="nav">
  <button onclick="showSection('register')">Register</button>
  <button onclick="showSection('add')">Add Tx</button>
  <button onclick="showSection('transactions')">Transactions</button>
  <button onclick="showSection('profit')">Profit/Loss</button>
  <button onclick="showSection('reck')">Reck</button>
</div>

<!-- REGISTER -->
<section id="register" class="section">
  <h2>Register</h2>
  <input id="username" placeholder="Username">
  <button onclick="register()">Register</button>
</section>

<!-- ADD -->
<section id="add" class="section hidden">
  <h2>Add Transaction</h2>
  <input id="userTx" placeholder="Username">
  <select id="type">
    <option value="BUY_IN">Buy-in</option>
    <option value="CASH_OUT">Cash-out</option>
  </select>
  <input id="amount" placeholder="Amount">
  <input id="date" type="date">
  <button onclick="addTransaction()">Add</button>
</section>

<!-- TRANSACTIONS -->
<section id="transactions" class="section hidden">
  <h2>Transactions</h2>

  <h3>By User (latest 40)</h3>
  <input id="txUser" placeholder="Username">
  <button onclick="txByUser()">Fetch</button>

  <h3>By Date (all users)</h3>
  <input id="txDate" type="date">
  <button onclick="txByDate()">Fetch</button>

  <div id="txTable"></div>
</section>

<!-- PROFIT -->
<section id="profit" class="section hidden">
  <h2>Profit / Loss</h2>

  <h3>User Summary</h3>
  <input id="profitUser" placeholder="Username">
  <button onclick="userProfitSummary()">Get Summary</button>

  <div id="profitTable"></div>

  <h3>All Users for a Date</h3>
  <input id="profitDate" type="date">
  <button onclick="allUsersProfit()">Check</button>

  <div id="allUsersProfitTable"></div>
</section>

<!-- RECK -->
<section id="reck" class="section hidden">
  <h2>Reck</h2>
  <input id="reckDate" type="date">
  <button onclick="reck()">Calculate</button>
  <p id="reckResult"></p>
</section>

<script src="app.js"></script>
</body>
</html>
